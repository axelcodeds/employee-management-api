services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ems
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - db
    environment:
      # Spring Boot will pick these environment variables automatically
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ems
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Rebuild the schema on each container start so old columns do not break startup
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"

volumes:
  db_data:

