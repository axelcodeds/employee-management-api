spring.application.name=ems
# Database settings are resolved from environment variables when running in containers
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ems}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Keep the existing DDL strategy by default; docker-compose sets the same value explicitly
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/api/ui